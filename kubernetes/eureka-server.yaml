# Deployment y Service del servidor de descubrimiento de servicios (Eureka)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: travelagency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: travelagency/eureka-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server:8888"
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: travelagency
spec:
  type: ClusterIP
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
