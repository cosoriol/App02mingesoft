# Deployment y Service del microservicio package-service
# Nota: server.port=0 asigna un puerto aleatorio; el ruteo real ocurre
# via Eureka (registro por IP de pod), no via este Service de Kubernetes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: package-service
  namespace: travelagency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: package-service
  template:
    metadata:
      labels:
        app: package-service
    spec:
      containers:
        - name: package-service
          image: travelagency/package-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka/"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/package_db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: package-service
  namespace: travelagency
spec:
  type: ClusterIP
  selector:
    app: package-service
  ports:
    - port: 8080
      targetPort: 8080
