# Configuracion del servidor de configuracion centralizada
server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file://${user.home}/App02Mingesoft/config-files/

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
