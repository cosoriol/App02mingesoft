# Configuracion del microservicio booking-service
server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/booking_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# Configuracion de descuentos acumulables para el proceso de reserva (Epica 4)
app:
  discount:
    group-threshold: 4
    group-percentage: 5.0
    frequent-threshold: 3
    frequent-percentage: 10.0
    multi-package-days: 30
    multi-package-percentage: 3.0
    max-total-discount: 20.0
