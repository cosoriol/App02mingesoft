# Configuracion del API Gateway
server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: package-service
          uri: lb://package-service
          predicates:
            - Path=/api/packages/**
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
        - id: confirmation-service
          uri: lb://confirmation-service
          predicates:
            - Path=/api/confirmations/**
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/reports/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
