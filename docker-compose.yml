version: "3.8"

# Orquestacion de la infraestructura de microservicios de TravelAgency
networks:
  travel-network:
    name: travel-network
    driver: bridge

services:

  # Base de datos PostgreSQL compartida (una base por microservicio)
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql
    networks:
      - travel-network

  # Servidor de configuracion centralizada
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-files:/root/App02Mingesoft/config-files:ro
    depends_on:
      - postgres
    networks:
      - travel-network

  # Servidor de descubrimiento de servicios (Eureka)
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
    ports:
      - "8761:8761"
    depends_on:
      - config-server
    networks:
      - travel-network

  # Puerta de enlace (API Gateway)
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    networks:
      - travel-network

  # Microservicio de paquetes turisticos
  package-service:
    build:
      context: .
      dockerfile: package-service/Dockerfile
    container_name: package-service
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/package_db
    depends_on:
      - api-gateway
    networks:
      - travel-network

  # Microservicio de busqueda
  search-service:
    build:
      context: .
      dockerfile: search-service/Dockerfile
    container_name: search-service
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/search_db
    depends_on:
      - api-gateway
    networks:
      - travel-network

  # Microservicio de reservas
  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    container_name: booking-service
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/booking_db
    depends_on:
      - api-gateway
    networks:
      - travel-network

  # Microservicio de pagos
  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
    depends_on:
      - api-gateway
    networks:
      - travel-network

  # Microservicio de confirmaciones
  confirmation-service:
    build:
      context: .
      dockerfile: confirmation-service/Dockerfile
    container_name: confirmation-service
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/confirmation_db
    depends_on:
      - api-gateway
    networks:
      - travel-network

  # Microservicio de reportes
  report-service:
    build:
      context: .
      dockerfile: report-service/Dockerfile
    container_name: report-service
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/report_db
    depends_on:
      - api-gateway
    networks:
      - travel-network

  # Frontend React servido por Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - package-service
      - search-service
      - booking-service
      - payment-service
      - confirmation-service
      - report-service
    networks:
      - travel-network

volumes:
  postgres-data:
